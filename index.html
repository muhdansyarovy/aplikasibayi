/* ========================================================================
AUDIO ANALYSIS ENGINE v2 — Scientifically Grounded Pipeline

Referensi akustik:

- Dunstan Baby Language (Priscilla Dunstan, 2006)
- “Infant cry classification” — IEEE signal processing literature
- Neonatal pain assessment via cry analysis (NIPS scale acoustic correlates)
  ======================================================================== */

/**

- estimateF0 — Fundamental frequency via autocorrelation
- Lebih akurat dari spectral centroid untuk pitch bayi (250-600 Hz)
  */
  function estimateF0(timeDomainData, sampleRate) {
  const n = timeDomainData.length;
  // Normalize ke float [-1, 1]
  const signal = new Float32Array(n);
  for (let i = 0; i < n; i++) signal[i] = (timeDomainData[i] - 128) / 128;

// Autocorrelation
const minLag = Math.floor(sampleRate / 800); // Max F0 = 800 Hz
const maxLag = Math.floor(sampleRate / 100); // Min F0 = 100 Hz

let bestCorr = -1, bestLag = minLag;
for (let lag = minLag; lag < Math.min(maxLag, n / 2); lag++) {
let corr = 0, norm1 = 0, norm2 = 0;
for (let i = 0; i < n - lag; i++) {
corr += signal[i] * signal[i + lag];
norm1 += signal[i] * signal[i];
norm2 += signal[i + lag] * signal[i + lag];
}
const normFactor = Math.sqrt(norm1 * norm2);
if (normFactor > 0) corr /= normFactor;
if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
}

const f0 = bestCorr > 0.3 ? sampleRate / bestLag : 0; // threshold confidence
return { f0: Math.round(f0), confidence: bestCorr };
}

/**

- computeJitter — Variasi periode antar siklus (% perturbation)
- Jitter tinggi → tangisan tidak stabil (sakit)
- Jitter rendah → tangisan ritmis (lapar)
  */
  function computeJitter(timeDomainData) {
  const n = timeDomainData.length;
  const signal = new Float32Array(n);
  for (let i = 0; i < n; i++) signal[i] = (timeDomainData[i] - 128) / 128;

// Deteksi zero-crossings positif
const crossings = [];
for (let i = 1; i < n; i++) {
if (signal[i - 1] < 0 && signal[i] >= 0) crossings.push(i);
}
if (crossings.length < 4) return 0;

const periods = [];
for (let i = 1; i < crossings.length; i++) periods.push(crossings[i] - crossings[i - 1]);

const avgPeriod = periods.reduce((s, p) => s + p, 0) / periods.length;
if (avgPeriod === 0) return 0;

let jitterSum = 0;
for (let i = 1; i < periods.length; i++) jitterSum += Math.abs(periods[i] - periods[i - 1]);
return (jitterSum / (periods.length - 1)) / avgPeriod;
}

/**

- computeShimmer — Variasi amplitudo antar siklus
- Shimmer tinggi → tangisan kasar/serak (distress)
  */
  function computeShimmer(timeDomainData) {
  const n = timeDomainData.length;
  const signal = new Float32Array(n);
  for (let i = 0; i < n; i++) signal[i] = Math.abs((timeDomainData[i] - 128) / 128);

// Puncak-puncak amplitudo
const peaks = [];
for (let i = 1; i < n - 1; i++) {
if (signal[i] > signal[i - 1] && signal[i] > signal[i + 1] && signal[i] > 0.05) {
peaks.push(signal[i]);
}
}
if (peaks.length < 4) return 0;

const avgPeak = peaks.reduce((s, p) => s + p, 0) / peaks.length;
if (avgPeak === 0) return 0;

let shimmerSum = 0;
for (let i = 1; i < peaks.length; i++) shimmerSum += Math.abs(peaks[i] - peaks[i - 1]);
return (shimmerSum / (peaks.length - 1)) / avgPeak;
}

/**

- computeHNR — Harmonic-to-Noise Ratio (dB)
- HNR tinggi → tangisan tonal/voiced (lapar, mengantuk)
- HNR rendah → tangisan noisy/dysphonic (sakit, kaget)
  */
  function computeHNR(timeDomainData, sampleRate) {
  const { f0, confidence } = estimateF0(timeDomainData, sampleRate);
  if (f0 === 0 || confidence < 0.3) return 0;

const n = timeDomainData.length;
const signal = new Float32Array(n);
for (let i = 0; i < n; i++) signal[i] = (timeDomainData[i] - 128) / 128;

const period = Math.round(sampleRate / f0);
if (period === 0 || period > n / 2) return 0;

let harmonicPower = 0, totalPower = 0;
for (let i = 0; i < n - period; i++) {
harmonicPower += signal[i] * signal[i + period];
totalPower += signal[i] * signal[i];
}

if (totalPower === 0) return 0;
const ratio = harmonicPower / totalPower;
return ratio > 0 && ratio < 1 ? 10 * Math.log10(ratio / (1 - ratio)) : 0;
}

/**

- detectCryBouts — Deteksi segmen tangisan aktif vs jeda
- Penting untuk menilai ritme dan pola
  */
  function detectCryBouts(frameHistory) {
  const AMPLITUDE_THRESHOLD = 8; // Minimum untuk dianggap tangisan
  const MIN_BOUT_FRAMES = 3; // Minimal 0.6 detik

const bouts = [];
let inBout = false, boutStart = 0;

for (let i = 0; i < frameHistory.length; i++) {
const isCry = frameHistory[i].avgAmplitude > AMPLITUDE_THRESHOLD;
if (isCry && !inBout) { inBout = true; boutStart = i; }
else if (!isCry && inBout) {
if (i - boutStart >= MIN_BOUT_FRAMES) {
bouts.push({ start: boutStart, end: i,
duration: (i - boutStart) * 0.2,
avgAmplitude: frameHistory.slice(boutStart, i).reduce((s, f) => s + f.avgAmplitude, 0) / (i - boutStart),
peakAmplitude: Math.max(…frameHistory.slice(boutStart, i).map(f => f.maxAmplitude)),
avgF0: frameHistory.slice(boutStart, i).reduce((s, f) => s + (f.f0 || 0), 0) / (i - boutStart)
});
}
inBout = false;
}
}
// Handle ongoing bout
if (inBout && frameHistory.length - boutStart >= MIN_BOUT_FRAMES) {
const end = frameHistory.length;
bouts.push({ start: boutStart, end,
duration: (end - boutStart) * 0.2,
avgAmplitude: frameHistory.slice(boutStart, end).reduce((s, f) => s + f.avgAmplitude, 0) / (end - boutStart),
peakAmplitude: Math.max(…frameHistory.slice(boutStart, end).map(f => f.maxAmplitude)),
avgF0: frameHistory.slice(boutStart, end).reduce((s, f) => s + (f.f0 || 0), 0) / (end - boutStart)
});
}
return bouts;
}

/**

- computeRhythmicity — Menghitung seberapa ritmis tangisan
- Ritmis tinggi → lapar (cry-pause-cry-pause teratur)
- Ritmis rendah → sakit/kaget (irregular)
  */
  function computeRhythmicity(bouts) {
  if (bouts.length < 3) return { score: 0, pattern: “insufficient_data” };

const durations = bouts.map(b => b.duration);
const gaps = [];
for (let i = 1; i < bouts.length; i++) {
gaps.push((bouts[i].start - bouts[i - 1].end) * 0.2);
}

// CV (Coefficient of Variation) — semakin rendah = semakin ritmis
const cvDuration = computeCV(durations);
const cvGaps = gaps.length > 1 ? computeCV(gaps) : 1;

// Skor ritme: 0-1, 1 = sangat ritmis
const rhythmScore = Math.max(0, 1 - (cvDuration + cvGaps) / 2);

let pattern = “irregular”;
if (rhythmScore > 0.7) pattern = “highly_rhythmic”;
else if (rhythmScore > 0.4) pattern = “semi_rhythmic”;

return { score: +rhythmScore.toFixed(3), pattern, boutCount: bouts.length,
avgBoutDuration: +(durations.reduce((s, d) => s + d, 0) / durations.length).toFixed(2),
avgGap: gaps.length ? +(gaps.reduce((s, g) => s + g, 0) / gaps.length).toFixed(2) : 0
};
}

function computeCV(arr) {
if (arr.length < 2) return 1;
const mean = arr.reduce((s, v) => s + v, 0) / arr.length;
if (mean === 0) return 1;
const std = Math.sqrt(arr.reduce((s, v) => s + Math.pow(v - mean, 2), 0) / arr.length);
return std / mean;
}

/**

- analyzeIntensityEnvelope — Pola intensitas sepanjang rekaman
- Rising → lapar (makin keras kalau tidak ditangani)
- Sustained high → sakit
- Decaying → mengantuk
- Spike-pause → kaget
  */
  function analyzeIntensityEnvelope(frameHistory) {
  const n = frameHistory.length;
  if (n < 5) return { trend: “flat”, slope: 0, peakPosition: 0.5, dynamicRange: 0 };

const amplitudes = frameHistory.map(f => f.avgAmplitude);
const maxAmp = Math.max(…amplitudes);
const minAmp = Math.min(…amplitudes);
const dynamicRange = maxAmp - minAmp;

// Linear regression untuk trend
let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
for (let i = 0; i < n; i++) {
sumX += i; sumY += amplitudes[i];
sumXY += i * amplitudes[i]; sumX2 += i * i;
}
const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);

// Peak position (0-1, awal-akhir)
const peakIdx = amplitudes.indexOf(maxAmp);
const peakPosition = peakIdx / (n - 1);

// Segmented analysis (3 windows)
const w = Math.floor(n / 3);
const seg1 = amplitudes.slice(0, w).reduce((s, v) => s + v, 0) / w;
const seg2 = amplitudes.slice(w, 2 * w).reduce((s, v) => s + v, 0) / w;
const seg3 = amplitudes.slice(2 * w).reduce((s, v) => s + v, 0) / (n - 2 * w);

let trend = “flat”;
if (slope > 0.3) trend = “rising”;
else if (slope < -0.3) trend = “falling”;
else if (seg2 > seg1 * 1.3 && seg2 > seg3 * 1.3) trend = “arch”; // puncak di tengah
else if (dynamicRange > maxAmp * 0.6) trend = “fluctuating”;

return { trend, slope: +slope.toFixed(4), peakPosition: +peakPosition.toFixed(2),
dynamicRange: +dynamicRange.toFixed(1),
segments: { early: +seg1.toFixed(1), mid: +seg2.toFixed(1), late: +seg3.toFixed(1) }
};
}

/**

- extractFeatures v2 — Enhanced per-frame extraction
  */
  function extractFeatures(analyserNode, sampleRate) {
  const fbc = analyserNode.frequencyBinCount;
  const freqData = new Uint8Array(fbc);
  const timeData = new Uint8Array(analyserNode.fftSize);
  analyserNode.getByteFrequencyData(freqData);
  analyserNode.getByteTimeDomainData(timeData);

// === Mel-frequency energies (32 bands) ===
const melBands = 32;
const melEnergies = new Float32Array(melBands);
const maxFreq = sampleRate / 2;
for (let m = 0; m < melBands; m++) {
const melLow = 2595 * Math.log10(1 + ((m / melBands) * maxFreq) / 700);
const melHigh = 2595 * Math.log10(1 + (((m + 1) / melBands) * maxFreq) / 700);
const binLow = Math.floor((700 * (Math.pow(10, melLow / 2595) - 1) / maxFreq) * fbc);
const binHigh = Math.min(Math.ceil((700 * (Math.pow(10, melHigh / 2595) - 1) / maxFreq) * fbc), fbc - 1);
let energy = 0, count = 0;
for (let b = binLow; b <= binHigh; b++) { energy += freqData[b]; count++; }
melEnergies[m] = count > 0 ? Math.log(energy / count + 1e-8) : 0;
}

// === Time-domain metrics ===
let maxAmplitude = 0, totalAmplitude = 0, zeroCrossings = 0;
for (let i = 0; i < timeData.length; i++) {
const a = Math.abs(timeData[i] - 128);
if (a > maxAmplitude) maxAmplitude = a;
totalAmplitude += a;
if (i > 0 && ((timeData[i] >= 128) !== (timeData[i - 1] >= 128))) zeroCrossings++;
}
const avgAmplitude = totalAmplitude / timeData.length;

// === Spectral metrics ===
let spectralCentroid = 0, totalFreqEnergy = 0;
for (let i = 0; i < fbc; i++) { spectralCentroid += i * freqData[i]; totalFreqEnergy += freqData[i]; }
spectralCentroid = totalFreqEnergy > 0 ? (spectralCentroid / totalFreqEnergy) * (maxFreq / fbc) : 0;

let cumEnergy = 0, spectralRolloff = 0;
for (let i = 0; i < fbc; i++) {
cumEnergy += freqData[i];
if (cumEnergy >= totalFreqEnergy * 0.85) { spectralRolloff = (i / fbc) * maxFreq; break; }
}

// === Band energies (lebih granular untuk tangisan bayi) ===
const bw = maxFreq / fbc;
let subBassEnergy = 0, bassEnergy = 0, lowMidEnergy = 0, midEnergy = 0,
highMidEnergy = 0, presenceEnergy = 0, brillianceEnergy = 0;
for (let i = 0; i < fbc; i++) {
const f = i * bw;
if (f < 150) subBassEnergy += freqData[i];       // Sub-bass rumble
else if (f < 400) bassEnergy += freqData[i];      // Fundamental cry range
else if (f < 800) lowMidEnergy += freqData[i];     // F0 harmonics
else if (f < 1500) midEnergy += freqData[i];       // Formant region
else if (f < 2500) highMidEnergy += freqData[i];   // Pain-related harmonics
else if (f < 4000) presenceEnergy += freqData[i];  // Sharpness/shriek
else brillianceEnergy += freqData[i];              // Noise/breathiness
}

// === Pitch (F0) via autocorrelation ===
const { f0, confidence: f0Confidence } = estimateF0(timeData, sampleRate);

// === Jitter & Shimmer ===
const jitter = computeJitter(timeData);
const shimmer = computeShimmer(timeData);

// === HNR ===
const hnr = computeHNR(timeData, sampleRate);

// === Spectral Flux (perubahan spektral antar-frame — deteksi onset) ===
// Disimpan per-frame, dihitung di aggregation

return {
melEnergies: Array.from(melEnergies),
avgAmplitude, maxAmplitude,
zeroCrossingRate: zeroCrossings / timeData.length,
spectralCentroid, spectralRolloff, totalEnergy: totalFreqEnergy,
// Granular bands
subBassEnergy, bassEnergy, lowMidEnergy, midEnergy,
highMidEnergy, presenceEnergy, brillianceEnergy,
// Pitch & voice quality
f0, f0Confidence, jitter, shimmer, hnr,
timestamp: Date.now()
};
}

/* ========================================================================
RULE-BASED PRE-CLASSIFIER

Berdasarkan literatur akustik tangisan bayi:

- Hungry: F0 250-450 Hz, ritmis, intensitas naik
- Pain:   F0 450-700 Hz, HNR rendah, jitter tinggi, intensitas tinggi
- Tired:  F0 rendah, intensitas rendah/turun, iregular
- Burping: durasi pendek, grunting (F0 rendah, noise burst)
- Scared: onset mendadak, amplitudo spike, F0 tinggi
- Lonely: F0 moderat, intensitas rendah, berhenti-mulai
  ======================================================================== */
  function ruleBasedPreClassify(aggregated) {
  const scores = {
  hungry: 0, belly_pain: 0, burping: 0, discomfort: 0,
  tired: 0, lonely: 0, scared: 0, cold_hot: 0, unknown: 0
  };

const { pitch, voiceQuality, rhythm, intensity, spectral, temporal } = aggregated;

// === HUNGRY ===
// Ritmis, F0 sedang, intensitas naik
if (rhythm.score > 0.4) scores.hungry += 20;
if (rhythm.score > 0.6) scores.hungry += 15;
if (pitch.meanF0 > 250 && pitch.meanF0 < 500) scores.hungry += 15;
if (intensity.trend === “rising”) scores.hungry += 20;
if (voiceQuality.meanHNR > 5) scores.hungry += 10;
if (voiceQuality.meanJitter < 0.08) scores.hungry += 10;
if (rhythm.boutCount >= 3) scores.hungry += 10;

// === BELLY PAIN (Kolik) ===
// F0 tinggi, intens, jitter tinggi, HNR rendah
if (pitch.meanF0 > 450) scores.belly_pain += 20;
if (pitch.meanF0 > 550) scores.belly_pain += 10;
if (intensity.meanAmplitude > 30) scores.belly_pain += 15;
if (voiceQuality.meanJitter > 0.1) scores.belly_pain += 15;
if (voiceQuality.meanHNR < 3) scores.belly_pain += 10;
if (intensity.trend === “sustained” || intensity.dynamicRange < 15) scores.belly_pain += 10;
if (spectral.presenceRatio > 0.15) scores.belly_pain += 10;
if (temporal.totalCryDuration > 8) scores.belly_pain += 10;

// === BURPING ===
// Pendek, intermittent, grunting low
if (rhythm.avgBoutDuration < 1.5) scores.burping += 20;
if (pitch.meanF0 < 350 && pitch.meanF0 > 0) scores.burping += 15;
if (rhythm.pattern === “irregular” || rhythm.boutCount > 4) scores.burping += 10;
if (intensity.meanAmplitude < 20) scores.burping += 10;
if (spectral.bassRatio > 0.3) scores.burping += 15;
if (voiceQuality.meanShimmer > 0.15) scores.burping += 10;

// === DISCOMFORT ===
// Medium, berselang, berubah-ubah
if (intensity.trend === “fluctuating”) scores.discomfort += 20;
if (rhythm.pattern === “semi_rhythmic”) scores.discomfort += 15;
if (pitch.f0CV > 0.2 && pitch.f0CV < 0.5) scores.discomfort += 15;
if (intensity.meanAmplitude > 15 && intensity.meanAmplitude < 35) scores.discomfort += 10;
if (rhythm.avgGap > 1 && rhythm.avgGap < 4) scores.discomfort += 10;

// === TIRED ===
// Lemah, merengek, intensitas turun
if (intensity.trend === “falling”) scores.tired += 25;
if (intensity.meanAmplitude < 18) scores.tired += 15;
if (pitch.meanF0 > 200 && pitch.meanF0 < 400) scores.tired += 10;
if (voiceQuality.meanHNR > 4) scores.tired += 10; // tonal whining
if (rhythm.pattern === “irregular”) scores.tired += 10;
if (spectral.midRatio > 0.3) scores.tired += 10;
if (rhythm.avgBoutDuration > 1 && rhythm.avgBoutDuration < 4) scores.tired += 10;

// === LONELY ===
// Rendah, intermittent, berhenti-mulai
if (pitch.meanF0 > 200 && pitch.meanF0 < 400) scores.lonely += 10;
if (intensity.meanAmplitude < 22) scores.lonely += 15;
if (rhythm.avgGap > 2) scores.lonely += 20;
if (rhythm.boutCount >= 2 && rhythm.boutCount <= 5) scores.lonely += 10;
if (intensity.trend === “fluctuating” || intensity.trend === “falling”) scores.lonely += 10;
if (voiceQuality.meanHNR > 3) scores.lonely += 10;

// === SCARED ===
// Onset mendadak, spike amplitudo, F0 tinggi
if (intensity.peakPosition < 0.25) scores.scared += 25; // peak di awal
if (pitch.meanF0 > 500) scores.scared += 15;
if (intensity.maxAmplitude > 50) scores.scared += 15;
if (intensity.dynamicRange > 30) scores.scared += 15;
if (temporal.totalCryDuration < 5) scores.scared += 10;
if (rhythm.boutCount <= 2) scores.scared += 10;

// === COLD/HOT ===
// Kontinu, medium pitch, steady
if (intensity.trend === “flat” || intensity.trend === “sustained”) scores.cold_hot += 20;
if (rhythm.score > 0.3 && rhythm.score < 0.6) scores.cold_hot += 15;
if (pitch.meanF0 > 300 && pitch.meanF0 < 500) scores.cold_hot += 10;
if (pitch.f0CV < 0.15) scores.cold_hot += 15;
if (intensity.meanAmplitude > 15 && intensity.meanAmplitude < 30) scores.cold_hot += 10;

// Normalize ke persentase
const maxScore = Math.max(…Object.values(scores), 1);
const normalized = {};
for (const [key, val] of Object.entries(scores)) {
normalized[key] = Math.round((val / maxScore) * 100);
}

// Sort dan return top 3
const sorted = Object.entries(normalized)
.sort((a, b) => b[1] - a[1])
.slice(0, 3)
.map(([cls, score]) => ({ class: cls, confidence: score }));

return sorted;
}

/* ========================================================================
AGGREGATE FEATURES — Dari frame-level ke recording-level
======================================================================== */
function aggregateFeatures(frameHistory, sampleRate) {
const n = frameHistory.length;
if (n < 5) return null;

const avg = (key) => frameHistory.reduce((s, f) => s + (f[key] || 0), 0) / n;

// — Pitch statistics —
const f0Values = frameHistory.map(f => f.f0).filter(v => v > 0);
const meanF0 = f0Values.length ? f0Values.reduce((s, v) => s + v, 0) / f0Values.length : 0;
const f0Std = f0Values.length > 1
? Math.sqrt(f0Values.reduce((s, v) => s + Math.pow(v - meanF0, 2), 0) / f0Values.length) : 0;
const f0CV = meanF0 > 0 ? f0Std / meanF0 : 0;
const maxF0 = f0Values.length ? Math.max(…f0Values) : 0;
const minF0 = f0Values.length ? Math.min(…f0Values) : 0;
// Pitch trend
let f0Trend = “stable”;
if (f0Values.length > 4) {
const h1 = f0Values.slice(0, Math.floor(f0Values.length/2));
const h2 = f0Values.slice(Math.floor(f0Values.length/2));
const m1 = h1.reduce((s,v)=>s+v,0)/h1.length;
const m2 = h2.reduce((s,v)=>s+v,0)/h2.length;
if (m2 > m1 * 1.1) f0Trend = “rising”;
else if (m2 < m1 * 0.9) f0Trend = “falling”;
}

// — Voice quality —
const meanJitter = avg(“jitter”);
const meanShimmer = avg(“shimmer”);
const meanHNR = avg(“hnr”);

// — Rhythm (bout analysis) —
const bouts = detectCryBouts(frameHistory);
const rhythm = computeRhythmicity(bouts);
const totalCryDuration = bouts.reduce((s, b) => s + b.duration, 0);
const totalRecordingDuration = n * 0.2;
const cryRatio = totalRecordingDuration > 0 ? totalCryDuration / totalRecordingDuration : 0;

// — Intensity envelope —
const envelope = analyzeIntensityEnvelope(frameHistory);
const meanAmplitude = avg(“avgAmplitude”);
const maxAmplitude = Math.max(…frameHistory.map(f => f.maxAmplitude));

// — Spectral profile —
const totalBandEnergy = avg(“bassEnergy”) + avg(“lowMidEnergy”) + avg(“midEnergy”) +
avg(“highMidEnergy”) + avg(“presenceEnergy”) + avg(“brillianceEnergy”);
const spectralProfile = totalBandEnergy > 0 ? {
bassRatio: +(avg(“bassEnergy”) / totalBandEnergy).toFixed(3),
lowMidRatio: +(avg(“lowMidEnergy”) / totalBandEnergy).toFixed(3),
midRatio: +(avg(“midEnergy”) / totalBandEnergy).toFixed(3),
highMidRatio: +(avg(“highMidEnergy”) / totalBandEnergy).toFixed(3),
presenceRatio: +(avg(“presenceEnergy”) / totalBandEnergy).toFixed(3),
brillianceRatio: +(avg(“brillianceEnergy”) / totalBandEnergy).toFixed(3),
} : { bassRatio:0, lowMidRatio:0, midRatio:0, highMidRatio:0, presenceRatio:0, brillianceRatio:0 };

// — Mel profile —
const melBands = frameHistory[0].melEnergies.length;
const melProfile = new Array(melBands).fill(0);
for (const f of frameHistory) for (let m = 0; m < melBands; m++) melProfile[m] += f.melEnergies[m] / n;

return {
pitch: { meanF0: +meanF0.toFixed(1), maxF0, minF0, f0Std: +f0Std.toFixed(1),
f0CV: +f0CV.toFixed(3), f0Trend, voicedFrameRatio: +(f0Values.length / n).toFixed(2) },
voiceQuality: { meanJitter: +meanJitter.toFixed(4), meanShimmer: +meanShimmer.toFixed(4),
meanHNR: +meanHNR.toFixed(2) },
rhythm: { …rhythm, totalCryDuration: +totalCryDuration.toFixed(1),
cryRatio: +cryRatio.toFixed(2) },
intensity: { …envelope, meanAmplitude: +meanAmplitude.toFixed(1),
maxAmplitude: +maxAmplitude.toFixed(0) },
spectral: { …spectralProfile, centroid: +avg(“spectralCentroid”).toFixed(1),
rolloff: +avg(“spectralRolloff”).toFixed(1),
zcr: +avg(“zeroCrossingRate”).toFixed(4) },
temporal: { totalFrames: n, recordingDuration: +totalRecordingDuration.toFixed(1),
totalCryDuration: +totalCryDuration.toFixed(1), boutCount: bouts.length },
melProfile: melProfile.map(v => +v.toFixed(2))
};
}

/* ========================================================================
CLASSIFY — Hybrid: Rule-based + LLM refinement
======================================================================== */
async function classify(history, sampleRate) {
if (history.length < 5) return null;

// Step 1: Aggregate features
const aggregated = aggregateFeatures(history, sampleRate);
if (!aggregated) throw new Error(“Data tidak cukup untuk analisis.”);

// Step 2: Rule-based pre-classification
const ruleResults = ruleBasedPreClassify(aggregated);

// Step 3: LLM refinement — kirim aggregated features + rule-based result
const sysPrompt = `Anda adalah sistem analisis tangisan bayi. Anda menerima data akustik yang sudah diekstrak dan hasil pre-klasifikasi dari rule-based system. Tugas Anda:

1. EVALUASI hasil rule-based berdasarkan fitur akustik:
- Pitch (F0): Lapar=250-450Hz, Sakit=450-700Hz, Kaget=tinggi mendadak, Mengantuk=rendah
- Voice Quality: Jitter tinggi=distress/sakit, HNR tinggi=tonal/lapar, HNR rendah=noise/sakit
- Rhythm: Ritmis=lapar, Irregular=sakit/mengantuk, Berhenti-mulai=lonely
- Intensity: Rising=lapar, Sustained high=sakit, Falling=mengantuk, Spike=kaget
- Spectral: High presence=shriek/sakit, Bass dominant=grunting/burping
1. SESUAIKAN confidence berdasarkan coherence antara fitur dan kelas.
1. Output HARUS murni JSON:
