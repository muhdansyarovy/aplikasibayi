<style>
:root {
  --bg-color: #F2F2F7;
  --text-main: #1C1C1E;
  --text-muted: #8E8E93;
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.8);
  --accent-blue: #0A84FF;
  --accent-red: #FF453A;
  --accent-purple: #BF5AF2;
  --accent-green: #32D74B;
  --accent-orange: #FF9F0A;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:var(--bg-color);background-image:radial-gradient(at 0% 0%,rgba(10,132,255,0.06) 0px,transparent 50%),radial-gradient(at 100% 0%,rgba(191,90,242,0.06) 0px,transparent 50%);color:var(--text-main);-webkit-font-smoothing:antialiased}
@keyframes slideUp{from{opacity:0;transform:translateY(28px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(10,132,255,0.15)}50%{transform:scale(1.05);box-shadow:0 0 0 24px rgba(10,132,255,0)}}
@keyframes pulseGlow{0%,100%{opacity:0.6;transform:scale(0.95)}50%{opacity:1;transform:scale(1.05)}}
.ios-glass{background:var(--glass-bg);-webkit-backdrop-filter:blur(48px) saturate(200%);backdrop-filter:blur(48px) saturate(200%);border:1px solid var(--glass-border);border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,0.04),inset 0 1px 1px rgba(255,255,255,0.8)}
.ios-glass-inner{background:rgba(255,255,255,0.5);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.6);border-radius:18px}
.ios-pill{-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border-radius:100px}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform 0.2s cubic-bezier(0.2,0.8,0.2,1)}
button:active{transform:scale(0.96)}
canvas{display:block}
.seg-btn{flex:1;padding:10px 0;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all 0.3s cubic-bezier(0.2,0.8,0.2,1)}
.seg-btn.active{color:var(--text-main);background:rgba(255,255,255,0.95);box-shadow:0 2px 8px rgba(0,0,0,0.06),0 1px 1px rgba(0,0,0,0.04)}
.seg-btn:not(.active){color:var(--text-muted);background:transparent}
.step-card{display:flex;gap:14px;padding:14px;border-radius:18px}
.warn-item{display:flex;gap:12px;padding:12px 14px;border-radius:16px;background:rgba(255,69,58,0.04);border:1px solid rgba(255,69,58,0.08)}
</style>
</head>

function extractFeatures(an,sr){const fbc=an.frequencyBinCount,fd=new Uint8Array(fbc),td=new Uint8Array(an.fftSize);an.getByteFrequencyData(fd);an.getByteTimeDomainData(td);const mb=32,me=new Float32Array(mb),mf=sr/2;for(let m=0;m<mb;m++){const mL=2595*Math.log10(1+((m/mb)*mf)/700),mH=2595*Math.log10(1+(((m+1)/mb)*mf)/700),bL=Math.floor((700*(Math.pow(10,mL/2595)-1)/mf)*fbc),bH=Math.min(Math.ceil((700*(Math.pow(10,mH/2595)-1)/mf)*fbc),fbc-1);let e=0,c=0;for(let b=bL;b<=bH;b++){e+=fd[b];c++;}me[m]=c>0?Math.log(e/c+1e-8):0;}let mxA=0,tA=0,zc=0;for(let i=0;i<td.length;i++){const a=Math.abs(td[i]-128);if(a>mxA)mxA=a;tA+=a;if(i>0&&((td[i]>=128)!==(td[i-1]>=128)))zc++;}let sc=0,tfe=0;for(let i=0;i<fbc;i++){sc+=i*fd[i];tfe+=fd[i];}sc=tfe>0?(sc/tfe)*(sr/2/fbc):0;let ce=0,ro=0;for(let i=0;i<fbc;i++){ce+=fd[i];if(ce>=tfe*0.85){ro=(i/fbc)*(sr/2);break;}}const bw=sr/(2*fbc);let lb=0,mmb=0,hb=0,vb=0;for(let i=0;i<fbc;i++){const f=i*bw;if(f<300)lb+=fd[i];else if(f<800)mmb+=fd[i];else if(f<2000)hb+=fd[i];else vb+=fd[i];}return{melEnergies:Array.from(me),avgAmplitude:tA/td.length,maxAmplitude:mxA,zeroCrossingRate:zc/td.length,spectralCentroid:sc,spectralRolloff:ro,totalEnergy:tfe,lowBand:lb,midBand:mmb,highBand:hb,vhighBand:vb,timestamp:Date.now()};}

function Spectrogram({data,rec}){const ref=useRef(null);useEffect(()=>{if(!ref.current||!data.length)return;const c=ref.current,x=c.getContext("2d"),d=window.devicePixelRatio||1,r=c.getBoundingClientRect();c.width=r.width*d;c.height=r.height*d;x.scale(d,d);const W=r.width,H=r.height;x.clearRect(0,0,W,H);const n=data.length,mb=data[0]?.melEnergies?.length||32;let mn=Infinity,mx=-Infinity;for(const f of data)for(const v of f.melEnergies){if(v<mn)mn=v;if(v>mx)mx=v;}const rg=mx-mn||1;for(let f=0;f<n;f++){const px=(f/n)*W,ml=data[f].melEnergies,bh=H/mb,cw=Math.max(2,W/n);for(let m=0;m<mb;m++){const nm=(ml[m]-mn)/rg,it=Math.pow(nm,0.7);x.fillStyle=`rgba(10,132,255,${it*0.8})`;x.fillRect(px,H-(m+1)*bh,cw+1,bh+1);}}},[data]);return(<div style={{position:"relative"}}><canvas ref={ref} style={{width:"100%",height:100,borderRadius:16,border:"1px solid rgba(0,0,0,0.04)",background:"rgba(255,255,255,0.4)"}}/>{rec&&<div style={{position:"absolute",top:8,right:10,background:"#FF453A",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#FFF",fontWeight:700,letterSpacing:"0.5px",animation:"blink 1.5s infinite",boxShadow:"0 2px 10px rgba(255,69,58,0.4)",display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:3,background:"#FFF"}}/>REC</div>}</div>);}

function Wave({aRef,rec}){const ref=useRef(null),anim=useRef(null);useEffect(()=>{if(!rec||!aRef.current||!ref.current)return;const c=ref.current,x=c.getContext("2d"),an=aRef.current,da=new Uint8Array(an.fftSize);const draw=()=>{anim.current=requestAnimationFrame(draw);an.getByteTimeDomainData(da);const d=window.devicePixelRatio||1,r=c.getBoundingClientRect();c.width=r.width*d;c.height=r.height*d;x.scale(d,d);const W=r.width,H=r.height;x.clearRect(0,0,W,H);x.strokeStyle="rgba(0,0,0,0.06)";x.lineWidth=1;x.beginPath();x.moveTo(0,H/2);x.lineTo(W,H/2);x.stroke();x.lineWidth=2.5;const g=x.createLinearGradient(0,0,W,0);g.addColorStop(0,"#0A84FF");g.addColorStop(0.5,"#BF5AF2");g.addColorStop(1,"#FF375F");x.strokeStyle=g;x.beginPath();const sw=W/da.length;let px=0;for(let i=0;i<da.length;i++){const v=da[i]/128,y=(v*H)/2;i===0?x.moveTo(px,y):x.lineTo(px,y);px+=sw;}x.stroke();};draw();return()=>cancelAnimationFrame(anim.current);},[rec,aRef]);return <canvas ref={ref} style={{width:"100%",height:50,borderRadius:16,border:"1px solid rgba(0,0,0,0.04)",background:"rgba(255,255,255,0.4)"}}/>;}

async function classify(history){
  if(history.length<5) return null;
  const n=history.length,av=(a,k)=>a.reduce((s,f)=>s+f[k],0)/n;
  const aa=av(history,"avgAmplitude"),ma=Math.max(...history.map(f=>f.maxAmplitude));
  const h1=history.slice(0,Math.floor(n/2)),h2=history.slice(Math.floor(n/2)),at=av(h2,"avgAmplitude")-av(h1,"avgAmplitude");
  const vr=history.reduce((s,f)=>s+Math.pow(f.avgAmplitude-aa,2),0)/n;
  const mb=history[0].melEnergies.length,mp=new Array(mb).fill(0);
  for(const f of history) for(let m=0;m<mb;m++) mp[m]+=f.melEnergies[m]/n;
  
  const fs={
    avgAmplitude:+aa.toFixed(2), maxAmplitude:+ma.toFixed(2), amplitudeTrend:at>2?"rising":at<-2?"falling":"stable",
    amplitudeVariance:+vr.toFixed(2), zeroCrossingRate:+av(history,"zeroCrossingRate").toFixed(4),
    spectralCentroid:+av(history,"spectralCentroid").toFixed(1), spectralRolloff:+av(history,"spectralRolloff").toFixed(1),
    bandEnergies:{low:+av(history,"lowBand").toFixed(1),mid:+av(history,"midBand").toFixed(1),high:+av(history,"highBand").toFixed(1),vhigh:+av(history,"vhighBand").toFixed(1)},
    melProfile:mp.map(v=>+v.toFixed(2)), duration:+(n*0.2).toFixed(1), frames:n
  };

  const sys = `Anda adalah Dokter Anak AI pakar. Analisis data fitur akustik tangisan bayi ini. Output HARUS murni JSON dengan format:
{"predictions":[{"class":"(pilih class)","confidence":(angka persentase)}],"analysis":"(Tuliskan analisis medis Anda berdasarkan data akustik di atas dalam bahasa Indonesia, maks 2 kalimat)","contextual_advice":"(Tuliskan saran penanganan praktis untuk orang tua, maks 2 kalimat)","urgency":"low|medium|high"}
Pilihan class HANYA: hungry, belly_pain, burping, discomfort, tired, lonely, scared, cold_hot, unknown. Pastikan 'analysis' dan 'contextual_advice' berisi kalimat saran asli buatan Anda, BUKAN teks template.`;

  try {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${window.__GROQ_KEY}` },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant", 
        messages: [{ role: "system", content: sys }, { role: "user", content: "Data fitur:\n" + JSON.stringify(fs, null, 2) }],
        response_format: { type: "json_object" }, temperature: 0.4
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error?.message || "API Error");
    return JSON.parse(d.choices[0].message.content);
  } catch(e) {
    throw new Error(e.message);
  }
}

<div style={{textAlign:"center",margin:"24px 0"}}>
{phase==="idle"&&<button onClick={start} style={{background:"#0A84FF",color:"#FFF",border:"none",borderRadius:20,padding:"18px 48px",fontWeight:600,fontSize:18,cursor:"pointer",boxShadow:"0 8px 24px rgba(10,132,255,0.3)",letterSpacing:"-0.3px",width:"100%"}}>Mulai Rekam</button>}
{phase==="recording"&&<button onClick={stop} style={{background:"#FF453A",color:"#FFF",border:"none",borderRadius:20,padding:"18px 48px",fontWeight:600,fontSize:18,cursor:"pointer",boxShadow:"0 8px 24px rgba(255,69,58,0.3)",width:"100%"}}>Berhenti & Analisis</button>}
{phase==="analyzing"&&<div style={{height:6,borderRadius:3,overflow:"hidden",background:"rgba(0,0,0,0.05)",width:"60%",margin:"0 auto"}}><div style={{width:"100%",height:"100%",background:"linear-gradient(90deg,transparent,#0A84FF,#BF5AF2,#FF375F,transparent)",backgroundSize:"200% 100%",animation:"shimmer 1.5s ease infinite"}}/></div>}
{phase==="idle"&&!error&&<p style={{fontSize:14,color:"#8E8E93",marginTop:16,fontWeight:500}}>Dekatkan mikrofon ke bayi · Minimal 3 detik</p>}
</div>

{error&&<div className="ios-glass" style={{background:"rgba(255,69,58,0.08)",border:"1px solid rgba(255,69,58,0.15)",padding:18,marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:10,color:"#FF453A",marginBottom:6}}><Icon name="alert" size={20}/><span style={{fontWeight:600,fontSize:15}}>Terjadi Kesalahan</span></div><p style={{fontSize:14,color:"#48484A",margin:0,lineHeight:1.4}}>{error}</p>{phase!=="recording"&&<button onClick={reset} style={{marginTop:14,background:"#FFF",border:"1px solid rgba(255,69,58,0.2)",borderRadius:12,padding:"10px 24px",color:"#FF453A",fontSize:15,cursor:"pointer",fontWeight:600,boxShadow:"0 2px 8px rgba(255,69,58,0.1)"}}>Coba Lagi</button>}</div>}

{results&&phase==="results"&&(<div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeIn 0.5s"}}>
<Urgency level={urgency}/>

<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8,padding:"0 4px"}}><span style={{fontWeight:700,fontSize:22,letterSpacing:"-0.5px"}}>Hasil Analisis</span><span style={{fontSize:12,color:"#8E8E93",background:"rgba(0,0,0,0.04)",padding:"4px 12px",borderRadius:10,fontWeight:600}}>{specData.length} frame</span></div>
{results.map((p,i)=><ResultCard key={p.class} pred={p} rank={i}/>)}

{aiAdvice&&<div className="ios-glass" style={{background:"rgba(191,90,242,0.06)",border:"1px solid rgba(191,90,242,0.15)",padding:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{width:32,height:32,borderRadius:10,background:"rgba(191,90,242,0.15)",display:"flex",alignItems:"center",justifyContent:"center",color:"#BF5AF2"}}><Icon name="bot" size={18}/></div><span style={{fontWeight:600,fontSize:15,color:"#BF5AF2"}}>Rekomendasi AI Llama-3</span></div><p style={{fontSize:15,color:"#1C1C1E",lineHeight:1.6,margin:0}}>{aiAdvice}</p></div>}
{aiAnalysis&&<div className="ios-glass" style={{background:"rgba(10,132,255,0.06)",border:"1px solid rgba(10,132,255,0.15)",padding:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{width:32,height:32,borderRadius:10,background:"rgba(10,132,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",color:"#0A84FF"}}><Icon name="cpu" size={18}/></div><span style={{fontWeight:600,fontSize:15,color:"#0A84FF"}}>Analisis Akustik</span></div><p style={{fontSize:15,color:"#48484A",lineHeight:1.6,margin:0}}>{aiAnalysis}</p></div>}

<button onClick={reset} style={{background:"rgba(0,0,0,0.05)",border:"none",borderRadius:20,padding:"18px 0",fontWeight:600,fontSize:17,color:"#0A84FF",cursor:"pointer",width:"100%",marginTop:10}}>Rekam Ulang</button>
</div>)}

{phase==="idle"&&!error&&(<div style={{animation:"slideUp 0.6s cubic-bezier(0.2,0.8,0.2,1) 0.1s both"}}>

<div className="ios-glass" style={{padding:24,marginTop:16}}>
<div style={{fontWeight:700,fontSize:18,marginBottom:18,letterSpacing:"-0.4px"}}>Fitur Lengkap</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
{[{icon:"file",t:"Langkah Praktis",d:"Panduan tahapan",cl:"#0A84FF"},{icon:"bot",t:"AI Kontekstual",d:"Rekomendasi Groq",cl:"#BF5AF2"},{icon:"alert",t:"Tanda Bahaya",d:"Kapan ke dokter",cl:"#FF453A"},{icon:"palette",t:"Tips Visual",d:"Ilustrasi posisi",cl:"#32D74B"}].map((f,i)=>(<div key={i} className="ios-glass-inner" style={{padding:16}}><div style={{width:40,height:40,borderRadius:12,background:f.cl+"15",display:"flex",alignItems:"center",justifyContent:"center",color:f.cl,marginBottom:12}}><Icon name={f.icon} size={20}/></div><div style={{fontWeight:600,fontSize:15,letterSpacing:"-0.3px"}}>{f.t}</div><div style={{fontSize:13,color:"#8E8E93",marginTop:4,lineHeight:1.4}}>{f.d}</div></div>))}
</div></div>

<div className="ios-glass" style={{padding:24,marginTop:16}}><div style={{fontWeight:700,fontSize:16,marginBottom:16}}>Spesifikasi Model</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 24px"}}>{[["Arsitektur","CNN-LSTM"],["Prosesor","Groq LPU"],["LLM Model","Llama-3.1 8B"],["Mel Bands","128"],["Kelas","9"],["Kecepatan","~800ms"]].map(([k,v],i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid rgba(0,0,0,0.03)"}}><span style={{fontSize:14,color:"#8E8E93"}}>{k}</span><span style={{fontSize:14,fontWeight:600,color:"#1C1C1E"}}>{v}</span></div>))}</div></div>

<div style={{marginTop:24,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
  <p style={{fontSize:13,color:"#C7C7CC",fontWeight:500}}>Powered by Groq Cloud API</p>
  {activeKeyDisplay&&<div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(50,215,75,0.1)",padding:"6px 14px",borderRadius:100,border:"1px solid rgba(50,215,75,0.2)"}}><div style={{width:8,height:8,borderRadius:4,background:"#32D74B",animation:"pulseGlow 2s infinite"}}/><span style={{fontSize:12,color:"#32D74B",fontWeight:700,letterSpacing:"0.5px"}}>{activeKeyDisplay}</span></div>}
  <button onClick={()=>setNeedKey(true)} style={{display:"flex",alignItems:"center",gap:6,background:"var(--glass-bg)",border:"1px solid var(--glass-border)",borderRadius:14,padding:"10px 20px",fontSize:14,fontWeight:600,color:"#48484A",cursor:"pointer",marginTop:8,boxShadow:"0 2px 8px rgba(0,0,0,0.03)"}}><Icon name="key" size={16}/>Atur Ulang API Key</button>
</div>

</div>)}
</div></div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
