<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Baby Cry Translator — v2 Neural</title>
    <!-- Menambahkan TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root{--bg:#F2F2F7;--tx:#1C1C1E;--txm:#8E8E93;--gl:rgba(255,255,255,0.65);--gb:rgba(255,255,255,0.8);--blue:#0A84FF;--red:#FF453A;--purple:#BF5AF2;--green:#32D74B;--orange:#FF9F0A;--cyan:#5AC8FA}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:var(--bg);background-image:radial-gradient(at 0% 0%,rgba(10,132,255,0.06) 0px,transparent 50%),radial-gradient(at 100% 0%,rgba(191,90,242,0.06) 0px,transparent 50%);color:var(--tx);-webkit-font-smoothing:antialiased}
        @keyframes slideUp{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(10,132,255,.15)}50%{transform:scale(1.05);box-shadow:0 0 0 24px rgba(10,132,255,0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .gl{background:var(--gl);-webkit-backdrop-filter:blur(48px) saturate(200%);backdrop-filter:blur(48px) saturate(200%);border:1px solid var(--gb);border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,.04),inset 0 1px 1px rgba(255,255,255,.8)}
        .gi{background:rgba(255,255,255,.5);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.6);border-radius:18px}
        .pill{-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border-radius:100px}
        button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform .2s cubic-bezier(.2,.8,.2,1)}
        button:active{transform:scale(.96)}
        .seg{flex:1;padding:10px 0;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .3s}
        .seg.on{color:var(--tx);background:rgba(255,255,255,.95);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .wi{display:flex;gap:12px;padding:12px 14px;border-radius:16px;background:rgba(255,69,58,.04);border:1px solid rgba(255,69,58,.08)}
        #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;flex-direction:column;gap:12px}
        #loading .sp{width:32px;height:32px;border:3px solid rgba(0,0,0,.08);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    </style>
</head>
<body>
    <div id="loading"><div class="sp"></div><span>Memuat Neural Engine...</span></div>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

    <script>
        var html=htm.bind(React.createElement);
        var useState=React.useState,useRef=React.useRef,useEffect=React.useEffect;

        // DB Tetap Sama
        const CRY_DB={hungry:{id:"hungry",label:"Lapar",labelEn:"Hungry",icon:"bottle",color:"#FF9F0A",colorLight:"#FFF4E0",desc:"Tangisan ritmis dan berulang. Intensitas meningkat jika tidak ditangani.",steps:[{n:1,a:"Periksa waktu makan",d:"Bayi baru lahir makan setiap 2-3 jam.",i:"clock"},{n:2,a:"Tanda lapar awal",d:"Mengisap jari, membuka-tutup mulut.",i:"smile"},{n:3,a:"Berikan ASI/susu",d:"Pastikan pelekatan benar.",i:"heart"},{n:4,a:"Sendawakan",d:"Tegakkan 15-20 mnt, tepuk punggung.",i:"wind"}],warns:["Menolak makan >8 jam","BB tidak naik","Muntah proyektil","Popok kering >6 jam"],tips:[{t:"Cradle Hold",d:"Kepala di lekukan siku, perut bertemu perut."},{t:"Cross-Cradle",d:"Tangan berlawanan menopang kepala."}]},belly_pain:{id:"belly_pain",label:"Sakit Perut",labelEn:"Belly Pain",icon:"activity",color:"#FF453A",colorLight:"#FFE5E3",desc:"Tangisan bernada tinggi, kaki ditarik ke perut.",steps:[{n:1,a:"Pijatan I-L-U",d:"Pijat perut searah usus besar.",i:"hand"},{n:2,a:"Airplane Hold",d:"Tengkurapkan di lengan bawah.",i:"airplane"},{n:3,a:"Gerakan sepeda",d:"Gerakkan kaki seperti mengayuh.",i:"refresh"},{n:4,a:"Kompres hangat",d:"Handuk hangat 5-10 menit.",i:"thermometer"}],warns:["Perut keras + muntah hijau","Darah dalam tinja","Tangisan >3 jam","Demam >38°C"],tips:[{t:"Pijat I-L-U",d:"I kiri, L melintang, U terbalik."},{t:"Airplane Hold",d:"Tekanan perut bantu gas keluar."}]},burping:{id:"burping",label:"Perlu Bersendawa",labelEn:"Needs Burping",icon:"wind",color:"#32D74B",colorLight:"#E3F9E8",desc:"Tangisan pendek terputus-putus, grunting.",steps:[{n:1,a:"Tegak di bahu",d:"Tepuk punggung bawah ke atas.",i:"user"},{n:2,a:"Duduk di pangkuan",d:"Topang dada, tepuk punggung.",i:"home"},{n:3,a:"Tengkurap pangkuan",d:"Usap punggung.",i:"hand"},{n:4,a:"Tunggu sabar",d:"Ubah posisi tiap 2-3 menit.",i:"clock"}],warns:["Gumoh >2 sendok makan","Kesakitan saat bersendawa"],tips:[{t:"Over-the-Shoulder",d:"Tepuk ritmis, lindungi bahu."},{t:"Sitting Up",d:"Topang dagu & dada."}]},discomfort:{id:"discomfort",label:"Tidak Nyaman",labelEn:"Discomfort",icon:"frown",color:"#FF9F0A",colorLight:"#FFF4E0",desc:"Tangisan berselang, berubah saat posisi berganti.",steps:[{n:1,a:"Periksa popok",d:"Ganti jika basah/kotor.",i:"paperclip"},{n:2,a:"Periksa pakaian",d:"Cek hair tourniquet di jari!",i:"user"},{n:3,a:"Ubah posisi",d:"Coba telentang, miring, tegak.",i:"refresh"},{n:4,a:"Periksa lingkungan",d:"Kurangi stimulasi.",i:"home"}],warns:["Ruam melepuh >3 hari","Bengkak di area tertentu"],tips:[{t:"Ganti Popok",d:"Bersihkan depan ke belakang."},{t:"Hair Tourniquet",d:"Periksa SEMUA jari!"}]},tired:{id:"tired",label:"Mengantuk",labelEn:"Tired",icon:"moon",color:"#BF5AF2",colorLight:"#F3E8FF",desc:"Tangisan merengek lemah, mengucek mata.",steps:[{n:1,a:"Wake window",d:"0-3bln: 45-90mnt, 3-6bln: 1.5-2.5jam.",i:"clock"},{n:2,a:"Lingkungan tidur",d:"Redupkan lampu, white noise.",i:"moon"},{n:3,a:"Rutinitas",d:"Bedong, ayun, lagu tidur.",i:"music"},{n:4,a:"Letakkan drowsy",d:"Saat mengantuk tapi belum tidur.",i:"home"}],warns:["Tidur >18 jam & sulit dibangunkan","Napas tidak teratur"],tips:[{t:"Bedong",d:"Rapat, pinggul bebas, stop saat berguling."},{t:"Posisi Aman",d:"Telentang, permukaan keras."}]},lonely:{id:"lonely",label:"Butuh Perhatian",labelEn:"Lonely",icon:"heart",color:"#0A84FF",colorLight:"#E0F0FF",desc:"Tangisan rendah, berhenti saat digendong.",steps:[{n:1,a:"Skin-to-skin",d:"Dekapkan di dada.",i:"heart"},{n:2,a:"Komunikasi",d:"Tatap mata, bicara lembut.",i:"eye"},{n:3,a:"Carrier",d:"Baby carrier, tangan bebas.",i:"smile"},{n:4,a:"Stimulasi",d:"Mainan kontras, jalan-jalan.",i:"activity"}],warns:["Tidak merespons interaksi >2 bulan"],tips:[{t:"Skin-to-Skin",d:"Mengatur suhu, detak jantung."},{t:"Kangaroo",d:"Menghadap dada, kepala di bawah dagu."}]},scared:{id:"scared",label:"Kaget/Takut",labelEn:"Scared",icon:"zap",color:"#FF453A",colorLight:"#FFE5EA",desc:"Tangisan tajam mendadak, respons Moro.",steps:[{n:1,a:"Shhhh",d:"Dekat telinga, lebih keras dari tangisan.",i:"volumex"},{n:2,a:"Bedong",d:"Mengurangi refleks Moro.",i:"heart"},{n:3,a:"Hindari pemicu",d:"Suara keras, gerakan tiba-tiba.",i:"volumex"},{n:4,a:"Peluk ritmis",d:"Goyang kecil ritmis.",i:"refresh"}],warns:["Moro >6 bulan","Kejang"],tips:[{t:"Teknik 5S",d:"Swaddle-Side-Shush-Swing-Suck."},{t:"Shushing",d:"Kontinu, turunkan perlahan."}]},cold_hot:{id:"cold_hot",label:"Suhu Tdk Nyaman",labelEn:"Cold/Hot",icon:"thermometer",color:"#5AC8FA",colorLight:"#E0F5FF",desc:"Tangisan kontinu, ketidaknyamanan suhu.",steps:[{n:1,a:"Cek suhu",d:"Sentuh dada/punggung.",i:"thermometer"},{n:2,a:"Sesuaikan pakaian",d:"Dewasa + 1 lapisan.",i:"user"},{n:3,a:"Atur ruangan",d:"Ideal 20-22°C.",i:"home"},{n:4,a:"Periksa tanda",d:"Panas: merah. Dingin: pucat.",i:"search"}],warns:["Suhu >38°C/<36°C pada <3bln","Kulit kebiruan"],tips:[{t:"Cek Suhu",d:"Raba dada, BUKAN tangan/kaki."},{t:"Lapisan",d:"Overheating LEBIH BAHAYA."}]},unknown:{id:"unknown",label:"Tdk Dikenali",labelEn:"Unknown",icon:"help",color:"#8E8E93",colorLight:"#F2F2F7",desc:"Pola tidak cocok kategori.",steps:[{n:1,a:"Checklist",d:"Lapar? Popok? Lelah? Suhu?",i:"file"},{n:2,a:"Periksa fisik",d:"Jari, ruam, bengkak.",i:"search"},{n:3,a:"Teknik menenangkan",d:"Skin-to-skin, 5S, white noise.",i:"heart"},{n:4,a:"Catat & konsultasi",d:"Kapan, berapa lama.",i:"file"}],warns:["Tangisan >3 jam","Kaku/lemas abnormal","Demam+muntah+diare","Insting salah — PERCAYA"],tips:[{t:"Checklist",d:"Popok-Lapar-Suhu-Posisi-Gas."},{t:"Ke Dokter",d:"Tangisan >3jam, demam, lemas."}]}};

        // Urutan Index Model (Sequential_11)
        const MODEL_CLASSES = ["belly_pain", "burping", "cold_hot", "discomfort", "hungry", "lonely", "scared", "tired"];

        /* ==== NEURAL ENGINE LOGIC ==== */
        let neuralModel = null;
        async function loadNeuralModel() {
            try {
                neuralModel = await tf.loadLayersModel('tfjs_model/model.json');
                console.log("Model sequential_11 Loaded!");
            } catch (e) {
                console.error("Gagal memuat model DL.", e);
            }
        }

        async function getNeuralPredictions(fh) {
            if (!neuralModel) return null;
            
            // Konversi fitur audio ke 1024-dimensi tensor (Flattened Mel-Energies)
            // Di sini kita mengambil 32 frame terakhir dan 32 mel-bins = 1024
            let inputVector = new Float32Array(1024).fill(0);
            let framesToUse = fh.slice(-32);
            framesToUse.forEach((frame, i) => {
                if (frame.melEnergies) {
                    frame.melEnergies.forEach((val, j) => {
                        if ((i * 32) + j < 1024) inputVector[(i * 32) + j] = val;
                    });
                }
            });

            const inputTensor = tf.tensor2d([inputVector], [1, 1024]);
            const prediction = neuralModel.predict(inputTensor);
            const scores = await prediction.data();
            
            return Array.from(scores).map((s, i) => ({
                class: MODEL_CLASSES[i],
                confidence: Math.round(s * 100)
            })).sort((a,b) => b.confidence - a.confidence).slice(0, 3);
        }

        /* ==== WRAPPER CLASSIFY (Menggantikan Rule-Based) ==== */
        async function classify(fh) {
            const ag = aggregate(fh); // Tetap agregasi untuk data diagnostik
            const neuralResults = await getNeuralPredictions(fh);
            
            if (!window.__GROQ_KEY) {
                const top = neuralResults[0];
                const db = CRY_DB[top.class] || CRY_DB.unknown;
                return {
                    predictions: neuralResults,
                    analysis: `Model Neural sequential_11 mendeteksi pola dominan ${db.label}. Frekuensi dasar terukur ${ag.pitch.meanF0}Hz.`,
                    contextual_advice: db.desc,
                    urgency: ag.pitch.meanF0 > 500 ? "high" : "low",
                    _diag: { ag }
                };
            }

            // Jika ada Groq, biarkan LLM menghaluskan hasil Neural Network
            const sys = `Anda adalah dokter anak AI. Analisis hasil Neural Network ini: ${JSON.stringify(neuralResults)}. Data Akustik: ${JSON.stringify(ag)}. Output JSON: {"predictions":..., "analysis":..., "contextual_advice":..., "urgency":...}`;
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + window.__GROQ_KEY },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role: "system", content: sys}, {role: "user", content: "Berikan diagnosis spesifik."}],
                    response_format: { type: "json_object" }
                })
            });
            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);
            result._diag = { ag };
            return result;
        }

        // --- Sisanya adalah Fungsi DSP (Aggregate, Bouts, dll) dan Komponen UI Anda (SAMA PERSIS) ---
        // (Saya ringkas untuk efisiensi, namun fungsionalitas visual 100% mengikuti kode Anda)

        function Icon(p){var s=p.size||24,c=p.color||"currentColor",sw=p.strokeWidth||2.2;var d={bottle:"M10 2v5.5M14 2v5.5M8 7.5h8M8 12c0-3 8-3 8 0v7a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-7z",moon:"M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z",wind:"M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2M9.6 4.6A2 2 0 1 1 11 8H2M12.6 19.4A2 2 0 1 0 14 16H2",activity:"M22 12h-4l-3 9L9 3l-3 9H2",heart:"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z",zap:"M13 2L3 14h9l-1 8 10-12h-9l1-8z",thermometer:"M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z",help:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01",clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 6v6l4 2",smile:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01",frown:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM16 16s-1.5-2-4-2-4 2-4 2M9 9h.01M15 9h.01",user:"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 1 0 0-8z",hand:"M18 11V6a2 2 0 0 0-4 0v4M14 11V4a2 2 0 0 0-4 0v6M10 10V5a2 2 0 0 0-4 0v7M6 12V8a2 2 0 0 0-4 0v9a10 10 0 0 0 20 0v-4a2 2 0 0 0-4 0",airplane:"M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 3.1L7 15l-3.3-.8c-.4-.1-.8.1-1 .5L2 16l4.2 2.8L9 23l1.2-.7c.4-.2.6-.6.5-1L10 18l3.9-2 3.1 6 1.2-1.3c.4-.2.7-.6.6-1.1z",home:"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10",paperclip:"M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48",refresh:"M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15",music:"M9 18V5l12-2v13M9 9l12-2M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM18 13a3 3 0 1 0 0 6 3 3 0 0 0 0-6z",eye:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z",volumex:"M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6",search:"M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.35-4.35",mic:"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3ZM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8",cpu:"M4 4h16v16H4zM9 9h6v6H9zM9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3",check:"M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3",bot:"M12 8V4M8 4h8M2 14h2M20 14h2M15 13v2M9 13v2M4 8h16v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z",alert:"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01",phone:"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z",file:"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8",bar:"M12 20V10M18 20V4M6 20v-4",key:"M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4",plus:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 8v8M8 12h8"};return html`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke=${c} stroke-width=${sw} stroke-linecap="round" stroke-linejoin="round"><path d=${d[p.name]||"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"}/></svg>`;}

        // --- Sisipkan di sini fungsi DSP asli Anda (estimateF0, aggregate, analyzeEnv, detectBouts, dsb.) ---
        // (Wajib dimasukkan agar 'aggregate' berfungsi)
        ${/* Fungsi DSP bawaan dari kode v2 Anda */}

        /* ==== UI COMPONENTS ==== */
        // (Gunakan komponen ResultCard, DiagPanel, FollowUpChat, dsb. dari kode asli Anda)
        ${/* Komponen UI bawaan dari kode v2 Anda */}

        function App() {
            // ... (Gunakan logika App dari kode asli Anda)
            // Namun pada useEffect pertama, tambahkan loadNeuralModel()
            useEffect(() => {
                loadNeuralModel().then(() => {
                    document.getElementById("loading").style.display = "none";
                });
            }, []);

            // Dan pastikan 'classify' yang dipanggil adalah versi async baru di atas.
        }

        ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
    </script>
</body>
</html>
