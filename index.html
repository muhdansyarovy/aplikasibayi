function GrowthTab(){

var _add=useState(false),add=_add[0],setAdd=_add[1];
var _w=useState(””),w=_w[0],setW=_w[1];

var _aiL=useState(false),aiL=_aiL[0],setAiL=_aiL[1];

function askAI(){if(!entries.length){setAiAdv(“Belum ada data. Tambahkan data pertumbuhan dulu.”);return;}setAiL(true);
var latest=entries[0],wr=whoRow(who.w,age),hr=whoRow(who.h,age);
groq(“Anda dokter anak. Evaluasi pertumbuhan bayi vs standar WHO. Berikan status persentil, evaluasi status gizi, dan rekomendasi catch-up SPESIFIK jika perlu (jenis MPASI, frekuensi makan, tips). Bahasa Indonesia, maks 3 paragraf. TANPA markdown/formatting.”,
“Bayi: “+selBaby.name+”, “+selBaby.gender+”, “+age+” bulan.\nBB lahir: “+selBaby.bw+” kg, PB lahir: “+selBaby.bh+” cm.\nData terakhir (”+latest.dt+”): BB=”+(latest.w||”?”)+“kg (WHO P50=”+wr[3]+”), PB=”+(latest.h||”?”)+“cm (WHO P50=”+hr[3]+”).\nWHO “+age+“bl: BB P3=”+wr[1]+” P50=”+wr[3]+” P97=”+wr[5]+”, PB P3=”+hr[1]+” P50=”+hr[3]+” P97=”+hr[5]+”.\nRiwayat: “+entries.slice(0,5).map(function(e){return e.dt+”: BB=”+(e.w||”?”)+”, PB=”+(e.h||”?”);}).join(”; “)).then(function(r){setAiL(false);setAiAdv(r||“Gagal menghubungi AI.”);});}

${entries.length>0&&h`<div style=${{marginTop:20}}>
  <div class="section-title">Riwayat Data</div>
  ${entries.slice(0,12).map(function(e,i){return h`<div key=${i} class="card-s" style=${{padding:"12px 14px",marginBottom:6,display:"flex",alignItems:"center"}}>

        ${e.w&&h`<span>BB: ${e.w}kg</span>`}${e.h&&h`<span>PB: ${e.h}cm</span>`}
      </div>
      ${e.note&&h`<div style=${{fontSize:11,color:"var(--tx3)",marginTop:3}}>${e.note}</div>`}

  </div>`;})}
</div>`}

  </div>`;
