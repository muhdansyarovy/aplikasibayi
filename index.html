<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Baby Cry Translator — Neural Engine</title>
    <!-- TensorFlow.js untuk menjalankan model sequential_11 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root {
            --bg: #F2F2F7; --tx: #1C1C1E; --txm: #8E8E93;
            --gl: rgba(255,255,255,0.65); --gb: rgba(255,255,255,0.8);
            --blue: #0A84FF; --red: #FF453A; --purple: #BF5AF2;
            --green: #32D74B; --orange: #FF9F0A; --cyan: #5AC8FA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg); color: var(--tx); line-height: 1.5;
        }
        .glass { background: var(--gl); backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--gb); border-radius: 24px; }
        .btn-primary { background: var(--blue); color: white; border: none; padding: 16px 32px; border-radius: 16px; font-weight: 600; font-size: 17px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
        .rec-pulse { width: 12px; height: 12px; background: var(--red); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

    <script>
        const html = htm.bind(React.createElement);
        const { useState, useEffect, useRef } = React;

        // 1. DATABASE TANGISAN (Mapping 8 Kelas Model)
        const CRY_DB = {
            hungry: { label: "Lapar", color: "var(--orange)", desc: "Tangisan berirama dengan jeda pendek untuk menarik napas.", steps: "Berikan ASI atau susu formula segera." },
            belly_pain: { label: "Sakit Perut", color: "var(--red)", desc: "Tangisan melengking tinggi, bayi sering menarik kaki ke perut.", steps: "Lakukan pijatan lembut 'I Love You' di perut bayi." },
            burping: { label: "Perlu Sendawa", color: "var(--green)", desc: "Suara tangisan terputus-putus seperti tertahan.", steps: "Gendong tegak bayi dan tepuk punggungnya perlahan." },
            discomfort: { label: "Tidak Nyaman", color: "var(--cyan)", desc: "Tangisan merengek, mungkin karena popok basah atau gerah.", steps: "Cek popok dan pastikan suhu ruangan nyaman." },
            tired: { label: "Mengantuk", color: "var(--purple)", desc: "Tangisan perlahan yang semakin intens, sering mengucek mata.", steps: "Bawa ke tempat tenang dan bantu bayi untuk tidur." },
            lonely: { label: "Butuh Dekapan", color: "var(--blue)", desc: "Tangisan akan berhenti seketika saat bayi digendong.", steps: "Berikan skin-to-skin contact atau pelukan hangat." },
            scared: { label: "Kaget/Takut", color: "#FF375F", desc: "Tangisan tajam yang terjadi tiba-tiba.", steps: "Tenangkan dengan suara lembut dan bedong bayi." },
            cold_hot: { label: "Suhu Tidak Pas", color: "var(--orange)", desc: "Bayi gelisah, cek apakah tangan/kaki terlalu dingin atau leher berkeringat.", steps: "Sesuaikan ketebalan pakaian atau suhu AC/kipas." }
        };

        // Urutan Index Model (Sesuai LabelEncoder saat training)
        const MODEL_CLASSES = ["belly_pain", "burping", "cold_hot", "discomfort", "hungry", "lonely", "scared", "tired"];

        function App() {
            const [status, setStatus] = useState('idle'); // idle, recording, processing, result
            const [result, setResult] = useState(null);
            const [model, setModel] = useState(null);
            const audioCtx = useRef(null);
            const analyzer = useRef(null);

            // 2. LOAD MODEL SAAT STARTUP
            useEffect(() => {
                const loadModel = async () => {
                    try {
                        const loadedModel = await tf.loadLayersModel('tfjs_model/model.json');
                        setModel(loadedModel);
                        console.log("Model sequential_11 loaded successfully!");
                    } catch (e) {
                        console.error("Gagal memuat model neural network:", e);
                    }
                };
                loadModel();
            }, []);

            const startRecording = async () => {
                setStatus('recording');
                // Simulasi pengambilan data audio
                setTimeout(() => processNeuralInference(), 4000); 
            };

            // 3. FLOW MASUK KE MODEL (NEURAL INFERENCE)
            const processNeuralInference = async () => {
                setStatus('processing');

                if (model) {
                    // Buat tensor 1024-dimensi (Simulasi dari ekstraksi fitur audio)
                    // Dalam implementasi nyata, ganti dummyData dengan array 1024 hasil ekstraksi audio
                    const dummyData = new Float32Array(1024).fill(0).map(() => Math.random());
                    const inputTensor = tf.tensor2d([dummyData], [1, 1024]);

                    // Prediksi menggunakan Deep Learning
                    const prediction = model.predict(inputTensor);
                    const scores = await prediction.data();
                    
                    // Cari index dengan probabilitas tertinggi
                    const maxIndex = scores.indexOf(Math.max(...scores));
                    const detectedClass = MODEL_CLASSES[maxIndex];
                    const confidence = Math.round(scores[maxIndex] * 100);

                    setResult({
                        ...CRY_DB[detectedClass],
                        confidence: confidence,
                        raw: detectedClass
                    });
                } else {
                    // Fallback jika model gagal dimuat
                    setResult({ ...CRY_DB.hungry, confidence: 0 });
                }
                
                setStatus('result');
            };

            return html`
                <div style=${{ padding: '20px', maxWidth: '500px', margin: '0 auto' }}>
                    <!-- HEADER -->
                    <header style=${{ textAlign: 'center', padding: '40px 0' }}>
                        <h1 style=${{ fontSize: '28px', fontWeight: '800', letterSpacing: '-0.5px' }}>Baby Cry AI</h1>
                        <p style=${{ color: 'var(--txm)', fontSize: '15px' }}>Neural Network Engine v2.0</p>
                    </header>

                    <!-- MAIN CARD -->
                    <div className="glass" style=${{ padding: '30px', textAlign: 'center', minHeight: '260px', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                        ${status === 'idle' && html`
                            <div>
                                <div style=${{ marginBottom: '20px', fontSize: '50px' }}>👶</div>
                                <button className="btn-primary" onClick=${startRecording}>Mulai Menganalisis</button>
                                <p style=${{ marginTop: '15px', fontSize: '13px', color: 'var(--txm)' }}>Pastikan suasana tenang</p>
                            </div>
                        `}

                        ${status === 'recording' && html`
                            <div className="slide-up">
                                <div style=${{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px', marginBottom: '15px' }}>
                                    <div className="rec-pulse"></div>
                                    <span style=${{ fontWeight: '700', fontSize: '18px', color: 'var(--red)' }}>MENDENGARKAN...</span>
                                </div>
                                <p style=${{ color: 'var(--txm)' }}>Dekatkan ponsel ke bayi Anda</p>
                            </div>
                        `}

                        ${status === 'processing' && html`
                            <div className="slide-up">
                                <div style=${{ marginBottom: '15px' }}>⌛</div>
                                <p style=${{ fontWeight: '600' }}>Menganalisis Pola Neural...</p>
                            </div>
                        `}

                        ${status === 'result' && result && html`
                            <div className="slide-up" style=${{ width: '100%' }}>
                                <div style=${{ display: 'inline-block', padding: '6px 14px', background: result.color + '20', color: result.color, borderRadius: '100px', fontSize: '12px', fontWeight: '800', marginBottom: '10px', textTransform: 'uppercase' }}>
                                    Confidence: ${result.confidence}%
                                </div>
                                <h2 style=${{ fontSize: '32px', fontWeight: '800', color: result.color }}>${result.label}</h2>
                                <p style=${{ marginTop: '12px', fontSize: '15px', color: 'var(--tx)' }}>${result.desc}</p>
                                
                                <div style=${{ marginTop: '25px', textAlign: 'left', background: 'rgba(0,0,0,0.03)', padding: '15px', borderRadius: '16px' }}>
                                    <strong style=${{ fontSize: '13px', textTransform: 'uppercase', color: 'var(--txm)' }}>Saran Penanganan:</strong>
                                    <p style=${{ marginTop: '5px', fontSize: '15px', fontWeight: '500' }}>${result.steps}</p>
                                </div>

                                <button onClick=${() => setStatus('idle')} style=${{ marginTop: '25px', border: 'none', background: 'none', color: var(--blue), fontWeight: '600', cursor: 'pointer' }}>Ulangi Analisis</button>
                            </div>
                        `}
                    </div>

                    <!-- FOOTER INFO -->
                    <div style=${{ marginTop: '20px', padding: '15px', textAlign: 'center', fontSize: '12px', color: 'var(--txm)' }}>
                        Model: <strong>sequential_11 (DNN)</strong><br/>
                        Architecture: 1024 Input → 256-128-64 (ELU) → 8 Output (Softmax)
                    </div>
                </div>
            `;
        }

        ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
    </script>
</body>
</html>
