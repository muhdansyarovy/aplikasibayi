<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeepInfant v2 — Neural Translator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <style>
        :root{--bg:#F2F2F7;--tx:#1C1C1E;--txm:#8E8E93;--gl:rgba(255,255,255,0.65);--gb:rgba(255,255,255,0.8);--blue:#0A84FF;--red:#FF453A;--purple:#BF5AF2;--green:#32D74B;--orange:#FF9F0A;--cyan:#5AC8FA}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .gl{background:var(--gl);-webkit-backdrop-filter:blur(40px);backdrop-filter:blur(40px);border:1px solid var(--gb);border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,.04)}
        .gi{background:rgba(255,255,255,.5);border-radius:18px;border:1px solid rgba(255,255,255,.6)}
        .pill{border-radius:100px;background:rgba(10,132,255,0.1);padding:6px 16px;display:inline-flex;align-items:center;gap:6px}
        button{transition:transform .2s;cursor:pointer;border:none}
        button:active{transform:scale(.96)}
        #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999;flex-direction:column;gap:12px}
        .sp{width:32px;height:32px;border:3px solid rgba(0,0,0,.08);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
        .seg{flex:1;padding:10px 0;border-radius:12px;font-size:13px;font-weight:600}
        .seg.on{background:#FFF;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    </style>
</head>
<body>
    <div id="loading"><div class="sp"></div><span>Menginisialisasi Mesin AI...</span></div>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

    <script>
        const html = htm.bind(React.createElement);
        const { useState, useRef, useEffect } = React;

        // KATEGORI MODEL (Sesuai urutan saat training Colab)
        const MODEL_CLASSES = ["belly_pain", "burping", "cold_hot", "discomfort", "hungry", "lonely", "scared", "tired"];

        const CRY_DB = {
            hungry: { label: "Lapar", icon: "bottle", color: "#FF9F0A", desc: "Tangisan ritmis, sering disertai gerakan menghisap." },
            belly_pain: { label: "Sakit Perut", icon: "activity", color: "#FF453A", desc: "Tangisan melengking tinggi, kaki sering ditarik ke perut." },
            burping: { label: "Perlu Sendawa", icon: "wind", color: "#32D74B", desc: "Suara terputus-putus seperti tertekan di dada." },
            discomfort: { label: "Tidak Nyaman", icon: "frown", color: "#FF9F0A", desc: "Gelisah, kemungkinan popok basah atau posisi salah." },
            tired: { label: "Mengantuk", icon: "moon", color: "#BF5AF2", desc: "Tangisan merengek yang perlahan menghilang." },
            lonely: { label: "Butuh Pelukan", icon: "heart", color: "#0A84FF", desc: "Tangisan yang langsung berhenti saat digendong." },
            scared: { label: "Kaget", icon: "zap", color: "#FF453A", desc: "Tangisan mendadak akibat suara atau gerakan tiba-tiba." },
            cold_hot: { label: "Suhu Tidak Pas", icon: "thermometer", color: "#5AC8FA", desc: "Kulit terasa panas atau dingin saat disentuh." },
            unknown: { label: "Misterius", icon: "help", color: "#8E8E93", desc: "Pola suara tidak spesifik." }
        };

        /* ==== ENGINE KLASIFIKASI DEEP LEARNING ==== */
        async function runInference(embeddings, tfModel) {
            if (!tfModel) return null;
            
            // Konversi 1024 embeddings ke Tensor
            const inputTensor = tf.tensor2d([embeddings], [1, 1024]);
            const prediction = tfModel.predict(inputTensor);
            const data = await prediction.data();
            
            // Ambil Top 3
            const results = Array.from(data)
                .map((prob, i) => ({
                    class: MODEL_CLASSES[i],
                    confidence: Math.round(prob * 100)
                }))
                .sort((a, b) => b.confidence - a.confidence)
                .slice(0, 3);
            
            inputTensor.dispose();
            prediction.dispose();
            return results;
        }

        /* ==== AUDIO FEATURE EXTRACTION (DSP) ==== */
        function extractFeatures(an, sr) {
            const fbc = an.frequencyBinCount;
            const fd = new Uint8Array(fbc);
            const td = new Uint8Array(an.fftSize);
            an.getByteFrequencyData(fd);
            an.getByteTimeDomainData(td);

            // Simulasi embedding 1024 (Untuk demo ini menggunakan mel-energy yang dipad)
            // Di produksi: Gunakan model YAMNet untuk extraksi embedding sebenarnya
            let emb = new Array(1024).fill(0);
            for(let i=0; i<fbc && i<1024; i++) emb[i] = fd[i] / 255;

            // Dasar Akustik (Untuk diagnostik LLM)
            let sum = 0, zc = 0;
            for(let i=0; i<td.length; i++) {
                sum += Math.abs(td[i]-128);
                if(i>0 && ((td[i]>=128) !== (td[i-1]>=128))) zc++;
            }

            return {
                embeddings: emb,
                avgAmp: sum / td.length,
                timestamp: Date.now()
            };
        }

        function App() {
            const [phase, setPhase] = useState('idle');
            const [model, setModel] = useState(null);
            const [results, setResults] = useState(null);
            const [diag, setDiag] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('groq_key') || '');
            
            const acRef = useRef(null);
            const anRef = useRef(null);
            const framesRef = useRef([]);

            // Load Model TensorFlow.js saat Start
            useEffect(() => {
                const loadModel = async () => {
                    try {
                        // Pastikan folder 'tfjs_model' ada di direktori yang sama
                        const m = await tf.loadLayersModel('./tfjs_model/model.json');
                        setModel(m);
                        document.getElementById("loading").style.display = "none";
                    } catch (e) {
                        console.error("Gagal memuat model:", e);
                        // Fallback jika model tidak ditemukan (untuk testing)
                        document.getElementById("loading").style.display = "none";
                    }
                };
                loadModel();
            }, []);

            const startRecording = async () => {
                framesRef.current = [];
                setResults(null);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const ac = new (window.AudioContext || window.webkitAudioContext)();
                    const src = ac.createMediaStreamSource(stream);
                    const an = ac.createAnalyser();
                    an.fftSize = 2048;
                    src.connect(an);
                    
                    acRef.current = ac;
                    anRef.current = an;
                    setPhase('recording');

                    const interval = setInterval(() => {
                        if (ac.state === 'closed') {
                            clearInterval(interval);
                            return;
                        }
                        const feat = extractFeatures(an, ac.sampleRate);
                        if (feat.avgAmp > 2) framesRef.current.push(feat);
                    }, 200);

                } catch (err) {
                    alert("Izin mik ditolak: " + err);
                }
            };

            const stopAndAnalyze = async () => {
                setPhase('analyzing');
                const stream = acRef.current;
                if (stream) acRef.current.close();

                if (framesRef.current.length < 5) {
                    alert("Suara terlalu pendek!");
                    setPhase('idle');
                    return;
                }

                // Rata-ratakan embeddings dari seluruh rekaman
                const finalEmb = new Array(1024).fill(0);
                framesRef.current.forEach(f => {
                    f.embeddings.forEach((v, i) => finalEmb[i] += v);
                });
                const avgEmb = finalEmb.map(v => v / framesRef.current.length);

                // Inference Neural Network
                const preds = await runInference(avgEmb, model);
                
                // Kirim ke Llama 3.3 untuk Verifikasi Diagnosa
                if (apiKey) {
                    try {
                        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                            method: "POST",
                            headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                            body: JSON.stringify({
                                model: "llama-3.3-70b-versatile",
                                messages: [{
                                    role: "system",
                                    content: "Anda adalah Dokter Anak AI. Analisis hasil klasifikasi Neural Network dan berikan saran medis empatik dalam Bahasa Indonesia."
                                }, {
                                    role: "user",
                                    content: `Hasil Prediksi ML: ${JSON.stringify(preds)}. Berikan penjelasan mengapa bayi menangis seperti itu.`
                                }],
                                response_format: { type: "json_object" }
                            })
                        });
                        const chatData = await response.json();
                        const aiContent = JSON.parse(chatData.choices[0].message.content);
                        setResults(preds);
                        setDiag(aiContent);
                    } catch (e) {
                        setResults(preds); // Fallback jika Groq gagal
                    }
                } else {
                    setResults(preds);
                }
                setPhase('results');
            };

            return html`
                <div style=${{maxWidth:480, margin:'0 auto', padding:20}}>
                    <header style=${{textAlign:'center', padding:'40px 0'}}>
                        <div className="pill"><span style=${{fontSize:12, fontWeight:800, color:'#0A84FF'}}>HYBRID AI v2.1</span></div>
                        <h1 style=${{fontSize:32, fontWeight:800, marginTop:10}}>Baby Translator</h1>
                    </header>

                    <main>
                        <div className="gl" style=${{padding:30, textAlign:'center', marginBottom:20}}>
                            ${phase === 'idle' && html`
                                <button onClick=${startRecording} style=${{width:100, height:100, borderRadius:50, background:'#0A84FF', color:'#FFF'}}>
                                    REC
                                </button>
                                <p style=${{marginTop:15, color:'#8E8E93'}}>Tekan untuk mulai mendengarkan</p>
                            `}

                            ${phase === 'recording' && html`
                                <button onClick=${stopAndAnalyze} style=${{width:100, height:100, borderRadius:50, background:'#FF453A', color:'#FFF', animation:'blink 1s infinite'}}>
                                    STOP
                                </button>
                                <p style=${{marginTop:15, color:'#FF453A', fontWeight:700}}>Merekam Tangisan...</p>
                            `}

                            ${phase === 'analyzing' && html`
                                <div className="sp" style=${{margin:'0 auto'}}></div>
                                <p style=${{marginTop:15}}>Neural Network sedang berpikir...</p>
                            `}
                        </div>

                        ${results && html`
                            <section style=${{animation:'slideUp 0.5s'}}>
                                <h3 style=${{marginBottom:15}}>Hasil Klasifikasi Neural</h3>
                                ${results.map(r => {
                                    const db = CRY_DB[r.class] || CRY_DB.unknown;
                                    return html`
                                        <div className="gl" style=${{padding:20, marginBottom:10, borderLeft:`6px solid ${db.color}`}}>
                                            <div style=${{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                                <span style=${{fontWeight:700, fontSize:18}}>${db.label}</span>
                                                <span style=${{color:db.color, fontWeight:800}}>${r.confidence}%</span>
                                            </div>
                                            <p style=${{fontSize:14, color:'#636366', marginTop:5}}>${db.desc}</p>
                                        </div>
                                    `;
                                })}
                                
                                ${diag && html`
                                    <div className="gl" style=${{padding:20, background:'rgba(50,215,75,0.1)', border:'1px solid #32D74B'}}>
                                        <h4 style=${{color:'#32D74B'}}>Analisis Llama 3.3:</h4>
                                        <p style=${{fontSize:15, marginTop:8}}>${diag.analysis || diag.explanation}</p>
                                    </div>
                                `}

                                <button onClick=${() => setPhase('idle')} style=${{width:'100%', padding:15, marginTop:20, borderRadius:15, background:'#E9E9EB'}}>
                                    Rekam Ulang
                                </button>
                            </section>
                        `}
                    </main>

                    <footer style=${{marginTop:40, textAlign:'center'}}>
                        <input 
                            type="password" 
                            placeholder="Set Groq API Key (gsk_...)" 
                            value=${apiKey}
                            onChange=${e => {
                                setApiKey(e.target.value);
                                localStorage.setItem('groq_key', e.target.value);
                            }}
                            style=${{width:'100%', padding:10, borderRadius:10, border:'1px solid #DDD', fontSize:12}}
                        />
                    </footer>
                </div>
            `;
        }

        ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
    </script>
</body>
</html>
