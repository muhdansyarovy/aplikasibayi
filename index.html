function estimateF0(td,sr){var n=td.length,sig=new Float32Array(n);for(var i=0;i<n;i++)sig[i]=(td[i]-128)/128;var minL=Math.floor(sr/800),maxL=Math.floor(sr/100),bC=-1,bL=minL;for(var lag=minL;lag<Math.min(maxL,n/2);lag++){var c=0,n1=0,n2=0;for(var j=0;j<n-lag;j++){c+=sig[j]*sig[j+lag];n1+=sig[j]*sig[j];n2+=sig[j+lag]*sig[j+lag];}var nf=Math.sqrt(n1*n2);if(nf>0)c/=nf;if(c>bC){bC=c;bL=lag;}}return{f0:bC>0.3?Math.round(sr/bL):0,conf:bC};}
function compJitter(td){var n=td.length,sig=new Float32Array(n);for(var i=0;i<n;i++)sig[i]=(td[i]-128)/128;var cx=[];for(var i=1;i<n;i++)if(sig[i-1]<0&&sig[i]>=0)cx.push(i);if(cx.length<4)return 0;var pr=[];for(var i=1;i<cx.length;i++)pr.push(cx[i]-cx[i-1]);var ap=pr.reduce(function(s,p){return s+p;},0)/pr.length;if(!ap)return 0;var js=0;for(var i=1;i<pr.length;i++)js+=Math.abs(pr[i]-pr[i-1]);return js/(pr.length-1)/ap;}

function compHNR(td,sr){var r=estimateF0(td,sr);if(!r.f0||r.conf<0.3)return 0;var n=td.length,sig=new Float32Array(n);for(var i=0;i<n;i++)sig[i]=(td[i]-128)/128;var pd=Math.round(sr/r.f0);if(!pd||pd>n/2)return 0;var hp=0,tp=0;for(var i=0;i<n-pd;i++){hp+=sig[i]*sig[i+pd];tp+=sig[i]*sig[i];}if(!tp)return 0;var rt=hp/tp;return rt>0&&rt<1?10*Math.log10(rt/(1-rt)):0;}
